services:
  - type: web
    name: finflow-backend
    env: node
    plan: free
    buildCommand: npm run install:all && npm run build
    startCommand: npm run db:migrate:deploy && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        value: file:./finance.db
      - key: JWT_SECRET
        generateValue: true
